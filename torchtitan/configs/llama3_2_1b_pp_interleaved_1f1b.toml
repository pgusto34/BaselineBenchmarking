[model]
module = "llama3"
config = "llama3_2_1b_fsdp"
hf_assets_path = "/opt/hf_assets/Llama-3.2-1B"
repo_id = "meta-llama/Llama-3.2-1B"

[training]
steps = 20
seq_len = 1024
global_batch_size = 24
local_batch_size = 12
mixed_precision_param = "bfloat16"

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = 2
tensor_parallel_degree = 1
pipeline_parallel_degree = 3
pipeline_parallel_schedule = "Interleaved1F1B"
# 16 local samples / 2 microbatch_size = 8 microbatches; satisfies pp*num_chunks (4*2=8)
pipeline_parallel_microbatch_size = 2
# reshard_after_forward=true reduces peak memory for interleaved schedules by
# resharding FSDP parameters after each forward chunk instead of holding all
# unsharded params resident. Trade-off: extra all-gather per chunk.
reshard_after_forward = true

[activation_checkpoint]
mode = "full"

[checkpoint]
enable = false
