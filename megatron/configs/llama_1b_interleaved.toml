[distributed]
gpus_per_node = 2

[parallelism]
pp_size = 2
num_layers_per_virtual_pipeline_stage = 4

[model]
dim = 2048
n_layers = 16
n_heads = 32
n_kv_heads = 8
vocab_size = 128256
multiple_of = 256
ffn_dim_multiplier = 1.5
rope_theta = 500000.0
swiglu = true
disable_bias_linear = true
untie_embeddings_and_output_weights = true
apply_layernorm_1p = true

[training]
micro_batch_size = 8
global_batch_size = 32
seq_length = 2048
max_position_embeddings = 2048
train_iters = 20
lr = 0.00015
min_lr = 0.00001
lr_decay_style = "cosine"
weight_decay = 0.1
clip_grad = 1.0
use_distributed_optimizer = false
log_interval = 1
eval_iters = 1
eval_interval = 10
save_interval = 1000
log_throughput = true

recompute_granularity = "selective"
recompute_modules = ["core_attn", "mlp"]

[precision]
dtype = "bf16"

[data]
use_mock_data = true
split = "95,5,5"
